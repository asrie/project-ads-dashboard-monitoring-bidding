# Single entrypoint: serves the Svelte SPA and proxies the Laravel API
# (PHP-FPM via FastCGI) on the same origin — no CORS needed in production.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (SECURITY.md).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 16m;

    # Laravel API + health check -> served from the shared backend volume.
    location ~ ^/(api|up) {
        root /var/www/html/public;
        try_files $uri /index.php?$query_string;
    }

    # PHP handled by the php-fpm "api" service.
    location ~ \.php$ {
        root /var/www/html/public;
        fastcgi_pass api:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;
    }

    # Cache built static assets aggressively (hashed filenames).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback for client-side (hash) routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
