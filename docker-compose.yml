name: ads-dashboard

# Shared runtime env for the Laravel containers (api + scheduler).
x-app-env: &app-env
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: http://localhost:8090
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: ads_dashboard
  DB_USERNAME: ads
  DB_PASSWORD: ads_secret_2026
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
  FRONTEND_URL: http://localhost:8090
  # Live monitoring config:
  MONITOR_REGION: docker
  # CRUX_API_KEY: <set to enable real Web Vitals fetch>
  # Prebid ingestion (browser push):
  PREBID_INGEST_KEY: demo-ingest-key-2026
  PREBID_INGEST_ORIGINS: https://www.kompas.tv,https://www.parapuan.co,https://www.sonora.id
  # Ad-layout preview renderer (Playwright service):
  RENDERER_URL: http://renderer:3000

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ads_dashboard
      POSTGRES_USER: ads
      POSTGRES_PASSWORD: ads_secret_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ads -d ads_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment: *app-env
    volumes:
      - backend_app:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      renderer:
        condition: service_started

  # Headless Playwright renderer for the Ad Layout preview (internal only).
  renderer:
    build:
      context: ./renderer
    restart: unless-stopped
    expose:
      - "3000"

  # Runs the Laravel scheduler -> monitor:uptime every 5 min, webvitals:fetch daily.
  scheduler:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment: *app-env
    volumes:
      - backend_app:/var/www/html
    # Reuse the already migrated/cached app from the shared volume.
    entrypoint: ["php"]
    command: ["artisan", "schedule:work"]
    depends_on:
      - api

  web:
    build:
      context: ./frontend
    ports:
      - "8090:80"
    volumes:
      - backend_app:/var/www/html:ro
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  backend_app:
